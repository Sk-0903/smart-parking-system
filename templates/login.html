{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 animate__animated animate__fadeInUp">
    <div class="glass-panel p-5 shadow-lg col-md-4 mx-auto text-center" style="border-radius: 20px;">

        <!-- 🔒 Security Icon -->
        <div class="mb-4">
            <i class="fas fa-fingerprint fa-3x text-info" style="text-shadow: 0 0 20px #00f0ff;"></i>
        </div>
        
        <h3 class="title-glow mb-4 text-light">Admin Access</h3>

        <form method="POST" class="text-start">

            <div class="input-group mb-3 cyber-input">
                <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
                <input type="text" name="username" placeholder="Username" class="form-control" required>
            </div>

            <div class="input-group mb-4 cyber-input">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" placeholder="Password" class="form-control" required>
            </div>

            <button class="btn btn-neon-purple w-100 btn-lg shadow-lg">
                <i class="fas fa-sign-in-alt"></i> Authenticate
            </button>

        </form>

    </div>
</div>

<!-- 🎨 SECURITY STYLES -->
<style>
.cyber-input .input-group-text {
    background: rgba(138, 43, 226, 0.1);
    color: #8a2be2;
    border: 1px solid rgba(138, 43, 226, 0.3);
    border-right: none;
}
.cyber-input .form-control {
    background: rgba(0, 0, 0, 0.4) !important;
    color: white !important;
    border: 1px solid rgba(138, 43, 226, 0.3);
    border-left: none;
}
.cyber-input .form-control::placeholder {
    color: rgba(255, 255, 255, 0.6) !important;
}
.cyber-input .form-control:focus {
    box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
    border-color: #8a2be2;
}
</style>

{% endblock %}
