{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4 animate__animated animate__fadeInDown">
    📊 Analytics Dashboard
</h2>

<div class="container">

    <!-- 🔥 TOP CARDS -->
    <div class="row text-center mb-4">

        <div class="col-md-3">
            <div class="card shadow border-0 bg-primary text-white p-3">
                <h5>📊 Total</h5>
                <h2 id="total">{{ total }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0 bg-success text-white p-3">
                <h5>🚗 Parked</h5>
                <h2 id="parked">{{ parked }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0 bg-danger text-white p-3">
                <h5>🚪 Exited</h5>
                <h2 id="exited">{{ exited }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0 bg-dark text-white p-3">
                <h5>💰 Revenue</h5>
                <h2 id="revenue">₹{{ revenue }}</h2>
            </div>
        </div>

    </div>

    <!-- 🔥 STATUS CHART -->
    <div class="card p-4 shadow mb-4">
        <h5 class="text-center mb-3">Vehicle Status</h5>
        <canvas id="statusChart"></canvas>
    </div>

    <!-- 🔥 REVENUE CHART -->
    <div class="card p-4 shadow">
        <h5 class="text-center mb-3">Revenue Overview</h5>
        <canvas id="revenueChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let statusChart, revenueChart;

document.addEventListener("DOMContentLoaded", function () {

    const parked = {{ parked | default(0) }};
    const exited = {{ exited | default(0) }};
    const revenue = {{ revenue | default(0) }};

    // 🔥 STATUS DOUGHNUT
    statusChart = new Chart(document.getElementById("statusChart"), {
        type: 'doughnut',
        data: {
            labels: ['Parked', 'Exited'],
            datasets: [{
                data: [parked, exited],
                backgroundColor: ['#28a745', '#dc3545'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            cutout: '70%',
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });

    // 🔥 REVENUE BAR
    revenueChart = new Chart(document.getElementById("revenueChart"), {
        type: 'bar',
        data: {
            labels: ['Total Revenue'],
            datasets: [{
                label: '₹ Earnings',
                data: [revenue],
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    // start auto update AFTER charts created
    setInterval(updateAnalytics, 5000);
});

// 🔥 AUTO REFRESH (smooth)
function updateAnalytics() {
    fetch('/stats')
        .then(res => res.json())
        .then(data => {

            // Update numbers
            document.getElementById("total").innerText = data.total;
            document.getElementById("parked").innerText = data.active;
            document.getElementById("exited").innerText = data.exited;
            document.getElementById("revenue").innerText = "₹" + data.revenue;

            // Update chart safely
            if (statusChart && revenueChart) {
                statusChart.data.datasets[0].data = [data.active, data.exited];
                statusChart.update();

                revenueChart.data.datasets[0].data = [data.revenue];
                revenueChart.update();
            }
        });
}
</script>

{% endblock %}
