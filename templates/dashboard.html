{% extends 'base.html' %}

{% block content %}

<div class="card p-4 text-center shadow">

    <h2 class="text-success">✅ Parking Confirmed</h2>

    <hr>

    <h5>Name: {{ user[1] }}</h5>
    <h5>Vehicle: {{ user[2] }}</h5>
    <h5>Plate: {{ user[3] }}</h5>
    <h5>Slot: {{ user[4] }}</h5>

    <!-- 🔥 TIMER -->
    <div class="mt-4">
        <h4>⏱️ Parking Time</h4>
        <h2 id="timer">00:00:00</h2>

        <h5>💰 Live Fee: ₹<span id="fee">0</span></h5>
    </div>

    <p class="mt-3 text-muted">Redirecting to home...</p>

</div>

<!-- 🔥 SCRIPT -->
<script>

    // ✅ FIX: proper parsing
    const entryTimeStr = "{{ entry_time or '' }}";
    const entryTime = new Date(entryTimeStr.replace(" ", "T"));

    function updateTimer() {
        const now = new Date();

        const diff = now - entryTime;

        if (isNaN(diff)) {
            document.getElementById("timer").innerText = "Loading...";
            return;
        }

        const seconds = Math.floor(diff / 1000);
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;

        document.getElementById("timer").innerText =
            `${hours.toString().padStart(2,'0')}:` +
            `${minutes.toString().padStart(2,'0')}:` +
            `${secs.toString().padStart(2,'0')}`;

        // 💰 Fee logic
        let rate = 50;
        if ("{{ user[2] }}" === "bike") rate = 20;

        const fee = Math.max(1, Math.ceil((hours + minutes / 60))) * rate;

        document.getElementById("fee").innerText = fee;
    }

    updateTimer(); // 🔥 run immediately
    setInterval(updateTimer, 1000);

</script>

<!-- 🔁 Redirect -->
<script>
    setTimeout(() => {
        window.location.href = "/";
    }, 15000);
</script>

{% endblock %}
