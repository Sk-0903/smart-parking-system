{% extends 'base.html' %}

{% block content %}
<h2 class="text-center mb-3 animate__animated animate__fadeInDown" style="position:relative; z-index:10;">
    🗺️ 3D Smart Parking
</h2>

<!-- 🔥 PREDICTION -->
<div class="text-center mb-3 animate__animated animate__fadeIn" style="position:relative; z-index:10;">
    <div class="alert alert-info shadow d-inline-block px-4 py-2"
        style="background: rgba(20,20,30,0.8); backdrop-filter:blur(10px); color: #00f0ff; border:1px solid #00f0ff;">
        {{ prediction }}
    </div>
</div>

<!-- 🔥 3D CANVAS CONTAINER -->
<div id="canvas-container" class="animate__animated animate__zoomIn"></div>

<!-- 🔥 POPUP -->
<div id="popup" class="popup">
    <div class="popup-content animate__animated animate__zoomIn">
        <h4 class="title-glow">🚗 Slot Details</h4>
        <p><strong>Plate:</strong> <span id="p_plate" class="text-info">--</span></p>
        <p><strong>Time:</strong> <span id="p_time">--</span></p>
        <p><strong>Fee:</strong> ₹<span id="p_fee" class="text-warning">0</span></p>

        <form method="POST" action="/exit">
            <input type="hidden" name="plate" id="p_input">
            <button class="btn btn-neon-pink w-100 mt-2">🚪 Exit Vehicle</button>
        </form>

        <button onclick="closePopup()" type="button" class="btn btn-outline-secondary mt-2 w-100">Close</button>
    </div>
</div>

<style>
    #canvas-container {
        width: 100%;
        height: 65vh;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 240, 255, 0.2);
        border: 1px solid rgba(0, 240, 255, 0.3);
        margin-bottom: 30px;
        position: relative;
        z-index: 1;
    }

    .popup {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .popup-content {
        background: var(--bg-card);
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        text-align: center;
        border: 1px solid var(--neon-cyan);
        box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
    }
</style>

<!-- 🔥 THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // INITIAL DATA FROM JINJA
    const initialSlotsData = [
        {% for s in slots %}
        { slot: {{ s.slot }}, plate: "{{ s.plate }}", time: "{{ s.time }}", fee: {{ s.fee }}, vehicle: "{{ s.vehicle }}" },
        {% endfor %}
    ];

    let scene, camera, renderer, controls, raycaster, mouse;
    let parkingSlots = {};
    let cars = {};

    function init3D() {
        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.FogExp2(0x050508, 0.015);

        camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(0, 35, 45);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;
        controls.minDistance = 20;
        controls.maxDistance = 80;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00f0ff, 1.2, 100);
        pointLight.position.set(0, 25, 0);
        scene.add(pointLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const groundGeo = new THREE.PlaneGeometry(120, 120);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a0f,
            roughness: 0.7,
            metalness: 0.3
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        drawSlots();
        initialSlotsData.forEach(data => addCar(data.slot, data));

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        renderer.domElement.addEventListener('click', onDocumentMouseClick, false);
        window.addEventListener('resize', onWindowResize, false);

        animate();
    }

    function drawSlots() {
        const cols = 10;
        const rows = 2;
        const slotWidth = 4;
        const slotLength = 8;
        const gapX = 1;
        const gapZ = 8;

        let slotId = 1;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {

                const x = (col - cols / 2 + 0.5) * (slotWidth + gapX);
                const z = (row - rows / 2 + 0.5) * (slotLength + gapZ);

                const edges = new THREE.EdgesGeometry(new THREE.PlaneGeometry(slotWidth, slotLength));
                const lineMat = new THREE.LineBasicMaterial({ color: 0x00f0ff, transparent: true, opacity: 0.4 });
                const line = new THREE.LineSegments(edges, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(x, 0.05, z);
                scene.add(line);

                const clickGeo = new THREE.BoxGeometry(slotWidth, 0.5, slotLength);
                const clickMat = new THREE.MeshBasicMaterial({ visible: false });
                const slotMesh = new THREE.Mesh(clickGeo, clickMat);
                slotMesh.position.set(x, 0.25, z);
                slotMesh.userData = { id: slotId, occupied: false };
                scene.add(slotMesh);

                parkingSlots[slotId] = { mesh: slotMesh, x: x, z: z };

                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#00f0ff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(slotId, 64, 45);

                const tex = new THREE.CanvasTexture(canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.7 });
                const sprite = new THREE.Sprite(spriteMat);
                sprite.scale.set(4, 2, 1);
                sprite.position.set(x, 0.1, z - slotLength / 2 - 1.5);
                scene.add(sprite);

                slotId++;
            }
        }
    }

    function addCar(slotId, data) {
        if (cars[slotId]) return;
        const slot = parkingSlots[slotId];
        if (!slot) return;

        const colorHex = slotId % 2 === 0 ? 0x8a2be2 : 0xff003c;
        const carMat = new THREE.MeshStandardMaterial({
            color: colorHex,
            roughness: 0.2,
            metalness: 0.8,
            emissive: colorHex,
            emissiveIntensity: 0.3
        });
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

        const vehicleGroup = new THREE.Group();

        if (data.vehicle === 'bike') {
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 3), carMat);
            body.position.y = 1;
            body.castShadow = true; body.receiveShadow = true;
            vehicleGroup.add(body);
            
            for(let i=0; i<2; i++) {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.2, 16), wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(0, 0.5, i === 0 ? 1 : -1);
                w.castShadow = true; w.receiveShadow = true;
                vehicleGroup.add(w);
            }
        } else if (data.vehicle === 'truck') {
            const cab = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 2.5), carMat);
            cab.position.set(0, 1.75, 2);
            cab.castShadow = true; cab.receiveShadow = true;
            
            const trailer = new THREE.Mesh(new THREE.BoxGeometry(3.2, 3.5, 5.5), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }));
            trailer.position.set(0, 2.25, -2);
            trailer.castShadow = true; trailer.receiveShadow = true;
            vehicleGroup.add(cab, trailer);

            const zPos = [2, -1, -3.5];
            zPos.forEach(z => {
                [-1.6, 1.6].forEach(x => {
                    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 16), wheelMat);
                    w.rotation.z = Math.PI/2;
                    w.position.set(x, 0.6, z);
                    w.castShadow = true; w.receiveShadow = true;
                    vehicleGroup.add(w);
                });
            });
        } else if (data.vehicle === 'bus') {
            const body = new THREE.Mesh(new THREE.BoxGeometry(3.2, 3, 8), carMat);
            body.position.y = 2;
            body.castShadow = true; body.receiveShadow = true;
            vehicleGroup.add(body);

            const zPos = [2.5, -2.5];
            zPos.forEach(z => {
                [-1.6, 1.6].forEach(x => {
                    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 16), wheelMat);
                    w.rotation.z = Math.PI/2;
                    w.position.set(x, 0.6, z);
                    w.castShadow = true; w.receiveShadow = true;
                    vehicleGroup.add(w);
                });
            });
        } else {
            const bottom = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 6), carMat);
            bottom.position.y = 0.9;
            bottom.castShadow = true; bottom.receiveShadow = true;
            
            const top = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.8, 3), carMat);
            top.position.set(0, 1.8, -0.5);
            top.castShadow = true; top.receiveShadow = true;
            
            vehicleGroup.add(bottom, top);

            const zPos = [1.8, -1.8];
            zPos.forEach(z => {
                [-1.5, 1.5].forEach(x => {
                    const w = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16), wheelMat);
                    w.rotation.z = Math.PI/2;
                    w.position.set(x, 0.5, z);
                    w.castShadow = true; w.receiveShadow = true;
                    vehicleGroup.add(w);
                });
            });
        }

        vehicleGroup.position.set(slot.x, 10, slot.z);
        
        vehicleGroup.children.forEach(child => {
            child.userData = { isCar: true, slotId: slotId, data: data };
        });

        scene.add(vehicleGroup);
        cars[slotId] = vehicleGroup;
        slot.mesh.userData.occupied = true;
        slot.mesh.userData.data = data;
    }

    function removeCar(slotId) {
        if (cars[slotId]) {
            scene.remove(cars[slotId]);
            cars[slotId].geometry.dispose();
            cars[slotId].material.dispose();
            delete cars[slotId];
        }
        if (parkingSlots[slotId]) {
            parkingSlots[slotId].mesh.userData.occupied = false;
            parkingSlots[slotId].mesh.userData.data = null;
        }
    }

    function onDocumentMouseClick(event) {
        event.preventDefault();
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children, true);

        for (let i = 0; i < intersects.length; i++) {
            const obj = intersects[i].object;
            if (obj.userData.isCar || (obj.userData.id && obj.userData.occupied)) {
                const data = obj.userData.data;
                if (data && data.plate) {
                    showPopup(data.plate, data.time, data.fee, obj.userData.slotId || obj.userData.id);
                }
                break;
            }
        }
    }

    function showPopup(plate, time, fee, slot) {
        document.getElementById("popup").style.display = "flex";
        document.getElementById("p_plate").textContent = plate;
        document.getElementById("p_time").textContent = time || "N/A";
        document.getElementById("p_fee").textContent = fee || "0";
        document.getElementById("p_input").value = plate;
    }

    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }

    function onWindowResize() {
        const container = document.getElementById('canvas-container');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        for (let id in cars) {
            if (cars[id].position.y > 1) {
                cars[id].position.y -= 0.6;
            } else {
                cars[id].position.y = 1;
            }
        }
        controls.update();
        renderer.render(scene, camera);
    }

    function updateSlotsAjax() {
        fetch('/slots')
            .then(res => res.json())
            .then(data => {
                const occupiedIds = new Set(data.map(d => d.slot).filter((_, i) => data[i].occupied));

                data.forEach(slotData => {
                    if (slotData.occupied && !cars[slotData.slot]) {
                        addCar(slotData.slot, slotData);
                    } else if (slotData.occupied && cars[slotData.slot]) {
                        cars[slotData.slot].userData.data = slotData;
                        parkingSlots[slotData.slot].mesh.userData.data = slotData;
                    }
                });

                for (let id in cars) {
                    if (!occupiedIds.has(parseInt(id))) {
                        removeCar(id);
                    }
                }
            });
    }

    window.addEventListener('load', () => {
        init3D();
        setInterval(() => {
            if (document.getElementById("popup").style.display !== "flex") {
                updateSlotsAjax();
            }
        }, 3000);
    });
</script>
{% endblock %}
