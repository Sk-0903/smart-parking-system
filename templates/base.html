<!DOCTYPE html>
<html lang="en">
<head>
    <title>Smart Parking</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* 🌌 PARTICLES / GRID BG */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: 
                linear-gradient(rgba(10, 10, 15, 0.9), rgba(10, 10, 15, 0.9)),
                repeating-linear-gradient(
                    0deg, transparent, transparent 49px, rgba(0, 240, 255, 0.05) 50px
                ),
                repeating-linear-gradient(
                    90deg, transparent, transparent 49px, rgba(0, 240, 255, 0.05) 50px
                );
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        .particles span {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.6);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
            animation: floatUp linear infinite;
        }

        .particles span:nth-child(odd) {
            width: 4px;
            height: 4px;
            animation-duration: 8s;
        }

        .particles span:nth-child(even) {
            width: 6px;
            height: 6px;
            animation-duration: 12s;
            background: rgba(138, 43, 226, 0.6);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .home-back-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-right: 15px;
            font-size: 18px;
            transition: 0.3s;
        }

        .home-back-btn:hover {
            background: rgba(0, 240, 255, 0.2);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
            transform: scale(1.1);
        }

        /* 🚗 NAVBAR */
        .navbar {
            background: rgba(10, 10, 15, 0.8) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        /* 🎥 LOADER */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00f0ff;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
        }
        
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 240, 255, 0.1);
            border-top: 4px solid #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ✅ POPUP */
        .popup-content {
            background: rgba(20, 20, 30, 0.9);
            color: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

    </style>

</head>

<body class="dark-mode">

<!-- 🎥 LOADER -->
<div id="loader">
    <div class="loader-ring"></div>
    INITIALIZING SYSTEM...
</div>

<!-- ✨ PARTICLES -->
<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- 🔔 SOUND -->
<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- 🚗 NAVBAR -->
<nav class="navbar navbar-dark px-3">

    {% if request.endpoint != 'index' %}
    <a href="{{ url_for('index') }}" class="home-back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    {% endif %}

    <span class="navbar-brand fs-4">
        <i class="fas fa-car text-warning" style="text-shadow: 0 0 10px #ff9900;"></i> SMART PARKING
    </span>

    <div>
        <button onclick="toggleDark()" class="btn btn-outline-light btn-sm" style="display:none;">🌙</button>
    </div>

</nav>


<!-- 📦 CONTENT -->
<div class="container mt-4 animate__animated animate__fadeIn">
    {% block content %}{% endblock %}
</div>

<script>

/* 🎥 LOADER */
window.addEventListener("load", function(){
    document.getElementById("loader").style.display = "none";
});

/* 🌙 DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}

/* 🎲 RANDOM PARTICLES */
document.querySelectorAll('.particles span').forEach((el) => {
    el.style.left = Math.random() * 100 + "%";
    el.style.animationDelay = Math.random() * 10 + "s";
});

</script>

</body>
</html>
