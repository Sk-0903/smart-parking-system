<!DOCTYPE html>
<html lang="en">
<head>
    <title>Smart Parking</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* 🌌 PARTICLES / GRID BG */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: 
                linear-gradient(rgba(10, 10, 15, 0.9), rgba(10, 10, 15, 0.9)),
                repeating-linear-gradient(
                    0deg, transparent, transparent 49px, rgba(0, 240, 255, 0.05) 50px
                ),
                repeating-linear-gradient(
                    90deg, transparent, transparent 49px, rgba(0, 240, 255, 0.05) 50px
                );
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        .particles span {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.6);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
            animation: floatUp linear infinite;
        }

        .particles span:nth-child(odd) {
            width: 4px;
            height: 4px;
            animation-duration: 8s;
        }

        .particles span:nth-child(even) {
            width: 6px;
            height: 6px;
            animation-duration: 12s;
            background: rgba(138, 43, 226, 0.6);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* 🎥 LOADER */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00f0ff;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
        }
        
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 240, 255, 0.1);
            border-top: 4px solid #00f0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ✅ POPUP */
        .popup-content {
            background: rgba(20, 20, 30, 0.9);
            color: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Smooth Hover Effects for Navbar */
        .nav-hover {
            transition: 0.3s ease-in-out;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .nav-hover:hover {
            color: #00f0ff !important;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            transform: translateY(-2px);
        }
        .nav-hover i {
            transition: 0.3s;
        }
        .nav-hover:hover i {
            color: #00f0ff !important;
        }

    </style>

</head>

<body class="dark-mode">

<!-- ✅ FIXED CURSOR -->
<div class="cursor-dot" data-cursor-dot></div>
<div class="cursor-outline" data-cursor-outline></div>

<!-- 🎥 LOADER -->
<div id="loader">
    <div class="loader-ring"></div>
    INITIALIZING SYSTEM...
</div>

<!-- ✨ PARTICLES -->
<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- 🔔 SOUND -->
<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- 🚀 GLOBAL STICKY NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-4 py-3 shadow-lg sticky-top" style="background: rgba(10, 10, 15, 0.85) !important; backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0, 240, 255, 0.2); z-index: 9999;">
    <div class="container-fluid">
        
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="fas fa-car-side text-info me-3 fs-3" style="text-shadow: 0 0 15px #00f0ff;"></i>
            <span class="fw-bold text-light" style="letter-spacing: 1.5px;">SMART PARKING</span>
        </a>

        <!-- Mobile Hamburger Menu Button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#globalNav" style="border-color: rgba(0, 240, 255, 0.5);">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navigation Links -->
        <div class="collapse navbar-collapse justify-content-end" id="globalNav">
            <ul class="navbar-nav align-items-center gap-4">
                <li class="nav-item">
                    <a class="nav-link nav-hover text-light" href="/"><i class="fas fa-home text-info me-1" style="text-shadow: 0 0 10px #00f0ff;"></i> Home</a>
                </li>
            <li class="nav-item">
                <a class="nav-link nav-hover text-light" href="/camera"><i class="fas fa-camera text-info me-1" style="text-shadow: 0 0 10px #00f0ff;"></i> Scanner</a>
            </li>
            <li class="nav-item">
                <a class="nav-link nav-hover text-light" href="/register"><i class="fas fa-parking text-info me-1" style="text-shadow: 0 0 10px #00f0ff;"></i> Park</a>
            </li>
            <li class="nav-item">
                <a class="nav-link nav-hover text-light" href="/exit"><i class="fas fa-sign-out-alt text-info me-1" style="text-shadow: 0 0 10px #00f0ff;"></i> Exit</a>
            </li>
            <li class="nav-item">
                <a class="nav-link nav-hover text-light" href="/map"><i class="fas fa-map text-info me-1" style="text-shadow: 0 0 10px #00f0ff;"></i> 3D Map</a>
            </li>
            <li class="nav-item">
                <a class="nav-link nav-hover text-light" href="/analytics"><i class="fas fa-chart-pie text-info me-1" style="text-shadow: 0 0 10px #00f0ff;"></i> Analytics</a>
            </li>
        
            <!-- Admin Button -->
            <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                <a class="btn btn-neon-purple px-4 py-2" href="/admin">
                    <i class="fas fa-user-shield me-1"></i> Admin Core
                </a>
            </li>
        </ul>
    </div>
    </div>
</nav>

<!-- 📦 CONTENT -->
<div class="container mt-4 animate__animated animate__fadeIn">
    {% block content %}{% endblock %}
</div>

<script>
window.addEventListener("load", function(){
    document.getElementById("loader").style.display = "none";
});

document.querySelectorAll('.particles span').forEach((el) => {
    el.style.left = Math.random() * 100 + "%";
    el.style.animationDelay = Math.random() * 10 + "s";
});

/* ✅ SINGLE CURSOR SCRIPT */
const cursorDot = document.querySelector("[data-cursor-dot]");
const cursorOutline = document.querySelector("[data-cursor-outline]");

if (window.innerWidth > 768) {
    window.addEventListener("mousemove", function (e) {
        cursorDot.style.left = e.clientX + "px";
        cursorDot.style.top = e.clientY + "px";

        cursorOutline.animate({
            left: e.clientX + "px",
            top: e.clientY + "px"
        }, { duration: 300, fill: "forwards" });
    });
}

/* 🧲 MAGNETIC BUTTONS */
document.querySelectorAll('.btn, .home-back-btn').forEach((el) => {
    el.addEventListener('mousemove', (e) => {
        const pos = el.getBoundingClientRect();
        const x = e.clientX - pos.left - pos.width / 2;
        const y = e.clientY - pos.top - pos.height / 2;
        el.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px)`;
    });
    el.addEventListener('mouseout', () => {
        el.style.transform = `translate(0px, 0px)`;
    });
});
</script>

<!-- ✅ SINGLE VANILLA TILT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
<script>
VanillaTilt.init(document.querySelectorAll(".glass-panel, .card"), {
    max: 10,
    speed: 400,
    glare: true,
    "max-glare": 0.2,
});
</script>

<!-- ✅ BOOTSTRAP JS FOR MOBILE NAVBAR -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
