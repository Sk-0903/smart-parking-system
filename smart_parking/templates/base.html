<!DOCTYPE html>
<html lang="en">
<head>
    <title>Smart Parking</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>

        /* 🌈 PREMIUM STATIC BACKGROUND */
        body {
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ✨ PARTICLES */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particles span {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            animation: floatUp linear infinite;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* DIFFERENT SIZES */
        .particles span:nth-child(odd) {
            width: 8px;
            height: 8px;
            animation-duration: 12s;
        }

        .particles span:nth-child(even) {
            width: 14px;
            height: 14px;
            animation-duration: 18s;
        }

        /* FLOATING EFFECT */
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            20% { opacity: 1; }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* 💎 CARDS */
        .card {
            border-radius: 20px;
            background: rgba(255,255,255,0.95);
            color: black;
            backdrop-filter: blur(12px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        /* 🔘 BUTTONS */
        .btn:hover {
            transform: scale(1.05);
        }

        /* 🌙 DARK MODE */
        .dark-mode {
            background: #121212 !important;
        }

        .dark-mode .card {
            background: #1e1e1e;
            color: white;
        }

        /* 🚗 NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
        }

        /* 🎥 LOADER */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
        }

    </style>
</head>

<body>

<!-- 🎥 LOADER -->
<div id="loader">
    🚗 Loading Smart Parking...
</div>

<!-- ✨ PARTICLES -->
<div class="particles">
    <!-- 30 bubbles -->
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- 🔔 SOUND -->
<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- 🚗 NAVBAR -->
<nav class="navbar navbar-dark px-3">

    <span class="navbar-brand fs-4">
        <i class="fas fa-car text-warning"></i> Smart Parking
    </span>

    <button onclick="toggleDark()" class="btn btn-outline-light">
        🌙
    </button>

</nav>

<!-- 📦 CONTENT -->
<div class="container mt-4 animate__animated animate__fadeIn">
    {% block content %}{% endblock %}
</div>

<script>

/* 🎥 LOADER */
window.addEventListener("load", function(){
    document.getElementById("loader").style.display = "none";
});

/* 🌙 DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}

/* 🎲 RANDOM PARTICLES */
document.querySelectorAll('.particles span').forEach((el) => {
    el.style.left = Math.random() * 100 + "%";
    el.style.animationDelay = Math.random() * 10 + "s";
});

</script>

</body>
</html>
