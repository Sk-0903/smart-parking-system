{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4 animate__animated animate__fadeInDown">
    📊 Analytics Dashboard
</h2>

<div class="container">

    <!-- TOP CARDS -->
    <div class="row text-center mb-4">

        <div class="col-md-4">
            <div class="card shadow border-0 bg-success text-white p-3">
                <h5>🚗 Parked</h5>
                <h2>{{ parked }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 bg-danger text-white p-3">
                <h5>🚪 Exited</h5>
                <h2>{{ exited }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 bg-dark text-white p-3">
                <h5>💰 Revenue</h5>
                <h2>₹{{ revenue }}</h2>
            </div>
        </div>

    </div>

    <!-- CHART -->
    <div class="card p-4 shadow">
        <canvas id="chart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const parked = {{ parked | default(0) }};
    const exited = {{ exited | default(0) }};

    const ctx = document.getElementById("chart").getContext("2d");

    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Parked', 'Exited'],
            datasets: [{
                data: [parked, exited],
                backgroundColor: ['#28a745', '#dc3545']
            }]
        },
        options: {
            responsive: true,
            cutout: '60%'
        }
    });

});
</script>

{% endblock %}
